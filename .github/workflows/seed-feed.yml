name: Seed IoC feed

# Daily IoC feed publisher. Replaces the old AWS Lambda + S3 seeder: builds the
# snapshot here (this repo has the source), then publishes to the public feed
# repo — full snapshot as a release asset, delta + manifest committed.
#
# Requires repo secret FEED_REPO_TOKEN: a PAT (or fine-grained token) with
# contents:write on ${{ env.FEED_REPO }}.

on:
  schedule:
    - cron: '0 6 * * *' # 06:00 UTC daily
  workflow_dispatch:
    inputs:
      date:
        description: 'Override publish date (YYYY-MM-DD)'
        required: false

permissions:
  contents: read

env:
  FEED_REPO: jmaleonard/tripwire-feed
  FEED_TAG: feed

jobs:
  seed:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tripwire/shared --filter @tripwire/feeds build

      - name: Checkout feed repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FEED_REPO }}
          token: ${{ secrets.FEED_REPO_TOKEN }}
          path: feed-repo

      - name: Build snapshot + delta + manifest
        env:
          FEED_REPO: ${{ env.FEED_REPO }}
          FEED_DIR: ${{ github.workspace }}/feed-repo
          FEED_TAG: ${{ env.FEED_TAG }}
          OUT_DIR: ${{ github.workspace }}/feed-out
          PUBLISH_DATE: ${{ github.event.inputs.date }}
        run: node scripts/publish-feed.mjs

      - name: Publish full snapshot (release asset)
        env:
          GH_TOKEN: ${{ secrets.FEED_REPO_TOKEN }}
        run: |
          set -euo pipefail
          # Ensure the rolling release exists, then clobber latest.json.
          gh release view "$FEED_TAG" --repo "$FEED_REPO" >/dev/null 2>&1 \
            || gh release create "$FEED_TAG" --repo "$FEED_REPO" \
                 --title "IoC feed" --notes "Rolling full IoC snapshot. See feed/v1/manifest.json."
          gh release upload "$FEED_TAG" "$GITHUB_WORKSPACE/feed-out/latest.json" \
            --repo "$FEED_REPO" --clobber

      - name: Commit delta + manifest to feed repo
        working-directory: feed-repo
        run: |
          set -euo pipefail
          git config user.name  "tripwire-feed-bot"
          git config user.email "noreply@github.com"
          git add -A feed/v1
          if git diff --cached --quiet; then
            echo "No manifest/delta changes to commit."
          else
            git commit -m "feed: publish ${PUBLISH_DATE:-$(date -u +%F)}"
            git push
          fi
        env:
          PUBLISH_DATE: ${{ github.event.inputs.date }}
